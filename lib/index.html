<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻陌 - 摄影交流分享</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { display: none; }
        
        /* 核心毛玻璃效果与渐变动画 */
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(255, 29, 187, 0.08);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #FF1DBB, #FFB099);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-brand-gradient {
            background: linear-gradient(135deg, #FF1DBB, #FFB099);
        }

        /* 瀑布流布局 */
        .waterfall {
            column-count: 2;
            column-gap: 12px;
        }
        .waterfall-item {
            break-inside: avoid;
            margin-bottom: 12px;
        }

        /* 页面切换动画 */
        .page { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .page.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="relative w-[393px] h-[852px] bg-[#fdfbfb] rounded-[48px] shadow-2xl overflow-hidden border-[8px] border-black">
        
        <div class="absolute inset-0 bg-gradient-to-br from-[#FF1DBB]/10 via-white/40 to-[#FFB099]/20 z-0 pointer-events-none"></div>

        <div class="absolute top-0 w-full h-[44px] flex justify-between items-center px-6 z-50 pointer-events-none">
            <span class="text-sm font-semibold text-gray-800">9:41</span>
            <div class="w-[120px] h-[30px] bg-black rounded-full absolute left-1/2 -translate-x-1/2 top-2"></div>
            <div class="flex gap-1 text-xs text-gray-800">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <div class="relative z-10 w-full h-full pb-[90px] pt-[60px] overflow-y-auto">

            <div id="page-home" class="page active px-4">
                <h1 class="text-3xl font-bold mb-6 text-gray-800 tracking-wider">探索<span class="text-gradient">视界</span></h1>
                
                <div class="glass-card rounded-[32px] p-2 mb-6 transition-transform active:scale-[0.98]">
                    <div class="relative rounded-[24px] overflow-hidden h-[380px]">
                        <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=800&q=80" class="w-full h-full object-cover" alt="精选">
                        <div class="absolute bottom-0 w-full p-5 bg-gradient-to-t from-black/70 to-transparent text-white">
                            <h2 class="text-xl font-bold mb-1">晨曦下的冰川</h2>
                            <p class="text-sm opacity-80 flex items-center gap-2">
                                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&q=80" class="w-6 h-6 rounded-full object-cover">
                                Lin.Photography
                            </p>
                        </div>
                    </div>
                </div>

                <h3 class="text-lg font-bold mb-3 text-gray-800 px-2">热门话题</h3>
                <div class="flex gap-3 overflow-x-auto pb-4 px-2">
                    <div class="bg-brand-gradient text-white px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap shadow-md"># 城市折叠</div>
                    <div class="glass-card px-5 py-2.5 rounded-full text-sm font-semibold text-gray-700 whitespace-nowrap"># 胶片复兴</div>
                    <div class="glass-card px-5 py-2.5 rounded-full text-sm font-semibold text-gray-700 whitespace-nowrap"># 街头瞬间</div>
                </div>
            </div>

            <div id="page-recommend" class="page px-4">
                <h1 class="text-2xl font-bold mb-5 text-gray-800">为你<span class="text-gradient">推荐</span></h1>
                
                <div class="waterfall">
                    <div class="waterfall-item glass-card rounded-[20px] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=400&q=80" class="w-full object-cover">
                        <div class="p-3">
                            <p class="text-[13px] font-medium text-gray-800 leading-tight mb-2">捕捉一束光，定格时间。</p>
                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <div class="flex items-center gap-1.5">
                                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100&q=80" class="w-5 h-5 rounded-full object-cover">
                                    <span class="truncate w-16">阿飞</span>
                                </div>
                                <span class="flex items-center gap-1 text-[#FF1DBB]"><i class="fas fa-heart"></i> 128</span>
                            </div>
                        </div>
                    </div>
                    <div class="waterfall-item glass-card rounded-[20px] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1516802273409-68526ee1bdd6?w=400&q=80" class="w-full object-cover">
                        <div class="p-3">
                            <p class="text-[13px] font-medium text-gray-800 leading-tight mb-2">极简几何空间。</p>
                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <div class="flex items-center gap-1.5">
                                    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=100&q=80" class="w-5 h-5 rounded-full object-cover">
                                    <span class="truncate w-16">DesignX</span>
                                </div>
                                <span class="flex items-center gap-1"><i class="far fa-heart"></i> 56</span>
                            </div>
                        </div>
                    </div>
                    <div class="waterfall-item glass-card rounded-[20px] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1606761568499-6d2451b08c66?w=400&q=80" class="w-full object-cover">
                        <div class="p-3">
                            <p class="text-[13px] font-medium text-gray-800 leading-tight mb-2">雨后的东京街头，霓虹倒影迷离。</p>
                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <div class="flex items-center gap-1.5">
                                    <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&q=80" class="w-5 h-5 rounded-full object-cover">
                                    <span class="truncate w-16">Yuki</span>
                                </div>
                                <span class="flex items-center gap-1"><i class="far fa-heart"></i> 342</span>
                            </div>
                        </div>
                    </div>
                    <div class="waterfall-item glass-card rounded-[20px] overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=400&q=80" class="w-full object-cover">
                        <div class="p-3">
                            <p class="text-[13px] font-medium text-gray-800 leading-tight mb-2">少女与海。</p>
                            <div class="flex justify-between items-center text-xs text-gray-500">
                                <div class="flex items-center gap-1.5">
                                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&q=80" class="w-5 h-5 rounded-full object-cover">
                                    <span class="truncate w-16">Miao</span>
                                </div>
                                <span class="flex items-center gap-1 text-[#FF1DBB]"><i class="fas fa-heart"></i> 89</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-fav" class="page px-4">
                <div class="flex justify-between items-end mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">我的<span class="text-gradient">灵感库</span></h1>
                    <span class="text-sm text-gray-500">共 124 幅作品</span>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative rounded-[20px] overflow-hidden aspect-square shadow-sm">
                        <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=400&q=80" class="w-full h-full object-cover">
                    </div>
                    <div class="relative rounded-[20px] overflow-hidden aspect-square shadow-sm">
                        <img src="https://images.unsplash.com/photo-1470071131384-001b85755b36?w=400&q=80" class="w-full h-full object-cover">
                    </div>
                    <div class="relative rounded-[20px] overflow-hidden aspect-square shadow-sm">
                        <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&q=80" class="w-full h-full object-cover">
                    </div>
                    <div class="relative rounded-[20px] overflow-hidden aspect-square shadow-sm">
                        <img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=400&q=80" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div id="page-profile" class="page px-4">
                
                <div class="glass-card rounded-[32px] p-6 mb-6 mt-4 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-[#FF1DBB] opacity-10 rounded-full blur-2xl"></div>

                    <div class="flex items-center gap-4 mb-5 relative z-10">
                        <div class="relative">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&q=80" class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-lg">
                            <div class="absolute bottom-0 right-0 bg-brand-gradient w-6 h-6 rounded-full border-2 border-white flex items-center justify-center text-white text-[10px]">
                                <i class="fas fa-camera"></i>
                            </div>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">晚风与猫</h2>
                            <p class="text-sm text-gray-500 mt-1">「用镜头记录温柔的瞬间」</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center px-4 relative z-10">
                        <div class="text-center">
                            <div class="font-bold text-lg text-gray-800">1.2k</div>
                            <div class="text-xs text-gray-500">获赞</div>
                        </div>
                        <div class="w-px h-8 bg-gray-200"></div>
                        <div class="text-center">
                            <div class="font-bold text-lg text-gray-800">856</div>
                            <div class="text-xs text-gray-500">粉丝</div>
                        </div>
                        <div class="w-px h-8 bg-gray-200"></div>
                        <div class="text-center">
                            <div class="font-bold text-lg text-gray-800">128</div>
                            <div class="text-xs text-gray-500">关注</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-[28px] overflow-hidden mb-8">
                    <ul class="text-[15px] font-medium text-gray-700">
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-star text-[#FFB099] w-5 text-center"></i> 我的推荐</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-question-circle text-gray-400 w-5 text-center"></i> 帮助反馈</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-exclamation-triangle text-gray-400 w-5 text-center"></i> 我要投诉</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-book text-gray-400 w-5 text-center"></i> 用户须知</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-shield-alt text-gray-400 w-5 text-center"></i> 隐私协议</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 border-b border-white/40 active:bg-white/30 transition-colors">
                            <div class="flex items-center gap-3"><i class="fas fa-info-circle text-gray-400 w-5 text-center"></i> 关于我们</div>
                            <i class="fas fa-chevron-right text-gray-400 text-sm"></i>
                        </li>
                        <li class="flex items-center justify-between px-5 py-4 active:bg-white/30 transition-colors text-red-500">
                            <div class="flex items-center gap-3"><i class="fas fa-sign-out-alt w-5 text-center"></i> 退出账号</div>
                        </li>
                    </ul>
                </div>
            </div>

        </div>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[345px] glass-card rounded-full px-6 py-4 flex justify-between items-center z-50">
            <button onclick="switchTab('home', this)" class="nav-btn text-[#FF1DBB] flex flex-col items-center gap-1 transition-transform transform active:scale-90">
                <i class="fas fa-compass text-xl"></i>
            </button>
            <button onclick="switchTab('recommend', this)" class="nav-btn text-gray-400 flex flex-col items-center gap-1 transition-transform transform active:scale-90">
                <i class="fas fa-layer-group text-xl"></i>
            </button>
            
            <button class="w-12 h-12 bg-brand-gradient rounded-full text-white shadow-lg flex items-center justify-center transform -translate-y-4 hover:scale-105 transition-transform border-4 border-[#fdfbfb]">
                <i class="fas fa-plus text-xl"></i>
            </button>

            <button onclick="switchTab('fav', this)" class="nav-btn text-gray-400 flex flex-col items-center gap-1 transition-transform transform active:scale-90">
                <i class="fas fa-bookmark text-xl"></i>
            </button>
            <button onclick="switchTab('profile', this)" class="nav-btn text-gray-400 flex flex-col items-center gap-1 transition-transform transform active:scale-90">
                <i class="fas fa-user text-xl"></i>
            </button>
        </div>

    </div>

    <script>
        function switchTab(pageId, btnElement) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 显示目标页面
            document.getElementById('page-' + pageId).classList.add('active');

            // 重置所有按钮颜色
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-[#FF1DBB]');
                btn.classList.add('text-gray-400');
            });
            
            // 激活当前按钮颜色
            btnElement.classList.remove('text-gray-400');
            btnElement.classList.add('text-[#FF1DBB]');
        }
    </script>
</body>
</html>
